name: Java matrix build
on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [master]

jobs:
  build-with-java:
    runs-on: homelab-runners
    strategy:
      matrix:
        java-version: [ 8, 11, 17, 21, 22, 23, 25 ]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5.0.1
      with:
        fetch-depth: 0
    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v5.2.0
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java-version }}
        cache: 'maven'
    - name: Install Maven
      run: |
        sudo apt-get update
        sudo apt-get install -y maven
    - name: Build with Maven
      run: mvn -B -q test
    - name: Copy dependencies for Sonar analysis
      if: matrix.java-version == 17
      run: mvn -B -q dependency:copy-dependencies -DincludeScope=test -DoutputDirectory=target/dependency
    - name: SonarQube Scan (PR)
      if: matrix.java-version == 17 && github.event_name == 'pull_request'
      uses: SonarSource/sonarqube-scan-action@v8.0.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: http://sonar.milanoid.net:9000
      with:
        args: >
          -Dsonar.pullrequest.key=${{ github.event.number }}
          -Dsonar.pullrequest.branch=${{ github.head_ref }}
          -Dsonar.pullrequest.base=${{ github.base_ref }}
          -Dsonar.pullrequest.github.repository=${{ github.repository }}
    - name: SonarQube Scan (branch)
      if: matrix.java-version == 17 && github.event_name != 'pull_request'
      uses: SonarSource/sonarqube-scan-action@v8.0.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: http://sonar.milanoid.net:9000
    - name: Check Quality Gate
      if: matrix.java-version == 17
      uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: http://sonar.milanoid.net:9000
